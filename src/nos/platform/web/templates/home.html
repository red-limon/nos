<!DOCTYPE html>
<html lang="en" data-theme="{% if request.path.startswith('/redlimon') %}redlemon{% else %}nos{% endif %}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app-theme.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme-light.css') }}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { margin: 0; padding: 0; overflow: hidden; }

        /* Iframe Container - navbar and content flush, no gap */
        .iframe-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        /* Navbar Iframe - app height (32px), no margin */
        #navbar-iframe {
            flex-shrink: 0;
            width: 100%;
            height: 32px;
            min-height: 32px;
            border: none;
            margin: 0;
            padding: 0;
            display: block;
            vertical-align: top;
            position: relative;
            z-index: 1000;
            overflow: hidden;
        }

        /* Content Iframe - fills rest, attached to navbar */
        #content-iframe {
            flex: 1;
            min-height: 0;
            width: 100%;
            border: none;
            margin: 0;
            padding: 0;
            display: block;
            vertical-align: top;
            position: relative;
            z-index: 1;
        }

        /* Offcanvas Menu - Terminal theme */
        .offcanvas {
            position: fixed; top: 0; left: -320px; width: 320px; max-width: 85vw; height: 100vh;
            background: var(--term-panel); color: var(--term-text); border-right: 1px solid var(--term-border);
            transition: left 0.3s ease; z-index: 3000; overflow-y: auto; font-family: inherit;
        }

        .offcanvas.open {
            left: 0;
        }

        .offcanvas-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 2500; /* Between iframes and offcanvas */
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .offcanvas-overlay.show {
            display: block;
            opacity: 1;
        }

        .offcanvas-header { 
            padding: 1rem 1.25rem; 
            border-bottom: 1px solid var(--term-border); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .offcanvas-brand {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            color: var(--term-accent, #00d4ff);
        }
        .offcanvas-close { background: none; border: none; color: var(--term-text); font-size: 1.5rem; cursor: pointer; padding: 0.25rem 0.5rem; transition: background 0.2s; }
        .offcanvas-close:hover { background: var(--term-border); }

        .offcanvas-body {
            padding: 1rem 0;
        }

        /* Tree Menu */
        .tree-menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .tree-menu-item {
            margin: 0;
        }

        .tree-menu-link {
            display: flex; align-items: center; padding: 0.55rem 1.25rem; color: var(--app-accent-hover);
            text-decoration: none; transition: background 0.2s; cursor: pointer; border: none; background: none;
            width: 100%; text-align: left; font-size: 0.85rem; font-family: inherit;
        }
        .tree-menu-link:hover { background: rgba(0, 212, 255, 0.08); }
        .tree-menu-link.active { background: rgba(0, 212, 255, 0.12); border-left: 3px solid var(--app-accent); }

        .tree-menu-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            margin-right: 0.6rem;
            flex-shrink: 0;
        }
        .tree-menu-icon svg {
            width: 100%;
            height: 100%;
            stroke: currentColor;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .tree-menu-toggle {
            margin-left: auto;
            transition: transform 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }
        .tree-menu-toggle svg {
            width: 100%;
            height: 100%;
            stroke: currentColor;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .tree-menu-toggle.expanded {
            transform: rotate(90deg);
        }

        .tree-menu-children {
            list-style: none;
            padding: 0;
            margin: 0;
            background: rgba(0, 0, 0, 0.2);
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .tree-menu-children.expanded {
            max-height: 10000px;
        }

        .tree-menu-children .tree-menu-link {
            padding-left: 2.5rem;
            font-size: 0.8rem;
        }

        .tree-menu-children .tree-menu-children .tree-menu-link {
            padding-left: 3.75rem;
            font-size: 0.78rem;
        }

        /* Level 3 and 4: consistent left padding by depth for alignment */
        .tree-menu-children .tree-menu-children .tree-menu-link {
            padding-left: 3.75rem;
            font-size: 0.8rem;
        }
        .tree-menu-children .tree-menu-children .tree-menu-children .tree-menu-link {
            padding-left: 5rem;
            font-size: 0.78rem;
        }

        /* Notification Badge */
        .menu-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 16px;
            height: 16px;
            padding: 0 4px;
            margin-left: auto;
            background: linear-gradient(135deg, #ff4081, #f50057);
            color: #fff;
            font-size: 0.65rem;
            font-weight: 600;
            border-radius: 8px;
            box-shadow: 0 0 8px rgba(255, 64, 129, 0.5);
            animation: badge-pulse 2s ease-in-out infinite;
        }
        @keyframes badge-pulse {
            0%, 100% { box-shadow: 0 0 8px rgba(255, 64, 129, 0.5); }
            50% { box-shadow: 0 0 14px rgba(255, 64, 129, 0.8); }
        }
    </style>
</head>

    <script>
        // Offcanvas menu toggle
        const offcanvasMenu = document.getElementById('offcanvas-menu');
        const offcanvasOverlay = document.getElementById('offcanvas-overlay');
        const offcanvasClose = document.getElementById('offcanvas-close');

        function openMenu() {
            offcanvasMenu.classList.add('open');
            offcanvasOverlay.classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        function closeMenu() {
            offcanvasMenu.classList.remove('open');
            offcanvasOverlay.classList.remove('show');
            document.body.style.overflow = '';
        }

        // Expose to parent window for iframe communication
        window.openMenu = openMenu;

        offcanvasClose.addEventListener('click', closeMenu);
        offcanvasOverlay.addEventListener('click', closeMenu);

        // Tree menu expand/collapse
        function toggleTreeItem(element) {
            const children = element.nextElementSibling;
            const toggle = element.querySelector('.tree-menu-toggle');
            
            if (children && children.classList.contains('tree-menu-children')) {
                children.classList.toggle('expanded');
                toggle.classList.toggle('expanded');
            }
        }

        // Load page in content iframe
        function loadPageInIframe(url) {
            const contentIframe = document.getElementById('content-iframe');
            contentIframe.src = url;
            closeMenu();
        }

        // Close menu on escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && offcanvasMenu.classList.contains('open')) {
                closeMenu();
            }
        });
    </script>
</body>
</html>
