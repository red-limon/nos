<!DOCTYPE html>
<html lang="en" data-theme="{% if request.path.startswith('/redlimon') %}redlemon{% else %}nos{% endif %}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error {{ error.code if error.code else 'Unknown' }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app-theme.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme-light.css') }}">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--app-bg, #050816);
            color: var(--app-text, #ffffff);
            font-family: var(--app-font, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif);
        }
        .error-page {
            text-align: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            background: rgba(12, 17, 23, 0.9);
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.45);
            border: 1px solid var(--app-border, #30363d);
            max-width: 420px;
            width: 100%;
        }
        .error-code {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            margin-bottom: 0.5rem;
        }
        .error-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            color: var(--app-text-muted, #8b949e);
            margin-bottom: 1.25rem;
        }
        .error-message {
            font-size: 0.98rem;
            color: var(--app-text-muted, #c9d1d9);
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-code">{{ error.code if error.code else 'Error' }}</div>
        <div class="error-label">Unexpected error</div>
        <p class="error-message">
            {{ error.description if error.description else (error|string) }}
        </p>
    </div>
</body>
</html>
