                },
                'vs-dark': {
                    '--term-bg': '#1e1e1e',
                    '--term-fg': '#d4d4d4',
                    '--term-border': '#404040',
                    '--term-selection': '#264f78',
                    '--header-bg': '#252526',
                    '--header-fg': '#cccccc',
                    '--log-info': '#569cd6',
                    '--log-debug': '#808080',
                    '--log-warning': '#dcdcaa',
                    '--log-error': '#f14c4c',
                    '--log-success': '#4ec9b0'
                },
                'abyss': {
                    '--term-bg': '#000c18',
                    '--term-fg': '#6688cc',
                    '--term-border': '#0a1929',
                    '--term-selection': '#1a3a5c',
                    '--header-bg': '#000814',
                    '--header-fg': '#6688cc',
                    '--log-info': '#6688cc',
                    '--log-debug': '#406385',
                    '--log-warning': '#ddbb88',
                    '--log-error': '#ff4444',
                    '--log-success': '#22aa44'
                },
                'vs-light': {
                    '--term-bg': '#ffffff',
                    '--term-fg': '#000000',
                    '--term-border': '#e8e8e8',
                    '--term-selection': '#add6ff',
                    '--header-bg': '#f3f3f3',
                    '--header-fg': '#000000',
                    '--log-info': '#0066cc',
                    '--log-debug': '#808080',
                    '--log-warning': '#b89500',
                    '--log-error': '#a31515',
                    '--log-success': '#008000'
                },
                'tomorrow-blue': {
                    '--term-bg': '#002451',
                    '--term-fg': '#ffffff',
                    '--term-border': '#003a70',
                    '--term-selection': '#003f8e',
                    '--header-bg': '#001e3d',
                    '--header-fg': '#ffffff',
                    '--log-info': '#bbdaff',
                    '--log-debug': '#7285b7',
                    '--log-warning': '#ffeead',
                    '--log-error': '#ff9da4',
                    '--log-success': '#d1f1a9'
                }
            };

            // Close all menus
            function closeAllMenus() {
                document.querySelectorAll('.menu-item').forEach(function(item) {
                    item.classList.remove('open');
                });
                menuState.openMenu = null;
            }

            // Toggle menu open/close
            function toggleMenu(menuItem) {
                const isOpen = menuItem.classList.contains('open');
                closeAllMenus();
                if (!isOpen) {
                    menuItem.classList.add('open');
                    menuState.openMenu = menuItem;
                }
            }

            // Apply theme
            function applyTheme(themeName) {
                const theme = themes[themeName];
                if (!theme) return;

                const root = document.documentElement;
                Object.keys(theme).forEach(function(prop) {
                    root.style.setProperty(prop, theme[prop]);
                });

                // Update body class for CodeMirror theme overrides
                document.body.classList.remove(
                    'theme-default', 
                    'theme-cursor-light', 
                    'theme-cursor-dark',
                    'theme-vs-dark',
                    'theme-abyss',
                    'theme-vs-light',
                    'theme-tomorrow-blue'
                );
                document.body.classList.add('theme-' + themeName);

                // Update active state in menu
                document.querySelectorAll('[data-theme]').forEach(function(btn) {
                    btn.classList.toggle('active', btn.getAttribute('data-theme') === themeName);
                });

                menuState.currentTheme = themeName;
                localStorage.setItem('nos-theme', themeName);
            }

            // Toggle compact view
            function toggleCompactView() {
                menuState.compactViewEnabled = !menuState.compactViewEnabled;
                document.body.classList.toggle('compact-view', menuState.compactViewEnabled);
                const btn = document.getElementById('menu-compact-view');
                if (btn) {
                    btn.classList.toggle('active', menuState.compactViewEnabled);
                }
                localStorage.setItem('nos-compact-view', menuState.compactViewEnabled);
            }

            // Toggle autosave
            function toggleAutosave() {
                menuState.autosaveEnabled = !menuState.autosaveEnabled;
                const btn = document.getElementById('menu-autosave');
                if (btn) {
                    btn.classList.toggle('active', menuState.autosaveEnabled);
                }
                localStorage.setItem('nos-autosave', menuState.autosaveEnabled);
            }

            // Initialize
            function init() {
                // Menu triggers
                document.querySelectorAll('.menu-trigger').forEach(function(trigger) {
                    trigger.addEventListener('click', function(e) {
                        e.stopPropagation();
                        toggleMenu(trigger.parentElement);
                    });
                });

                // Hover to switch menus when one is open
                document.querySelectorAll('.menu-item').forEach(function(item) {
                    item.addEventListener('mouseenter', function() {
                        if (menuState.openMenu && menuState.openMenu !== item) {
                            closeAllMenus();
                            item.classList.add('open');
                            menuState.openMenu = item;
                        }
                    });
                });

                // Close menus when clicking outside
                document.addEventListener('click', function(e) {
                    if (!e.target.closest('.menu-item')) {
                        closeAllMenus();
                    }
                });

                // Reconnect
                const btnReconnect = document.getElementById('menu-reconnect');
                if (btnReconnect) {
                    btnReconnect.addEventListener('click', function() {
                        // Dispatch event that console module will handle
                        window.dispatchEvent(new CustomEvent('menu-reconnect'));
                        closeAllMenus();
                    });
                }

                // New Window
                const btnNewWindow = document.getElementById('menu-new-window');
                if (btnNewWindow) {
                    btnNewWindow.addEventListener('click', function() {
                        window.open(window.location.href, '_blank');
                        closeAllMenus();
                    });
                }

                // Close
                const btnClose = document.getElementById('menu-close');
                if (btnClose) {
                    btnClose.addEventListener('click', function() {
                        window.close();
                    });
                }

                // Theme options
                document.querySelectorAll('[data-theme]').forEach(function(btn) {
                    btn.addEventListener('click', function() {
                        applyTheme(btn.getAttribute('data-theme'));
                        closeAllMenus();
                    });
                });

                // Compact view toggle
                const btnCompactView = document.getElementById('menu-compact-view');
                if (btnCompactView) {
                    btnCompactView.addEventListener('click', function() {
                        toggleCompactView();
                        closeAllMenus();
                    });
                }

                // Autosave toggle
                const btnAutosave = document.getElementById('menu-autosave');
                if (btnAutosave) {
                    btnAutosave.addEventListener('click', function() {
                        toggleAutosave();
                        closeAllMenus();
                    });
                }
                
                // Run Mode selection (Direct/Registry)
                document.querySelectorAll('[data-runmode]').forEach(function(opt) {
                    opt.addEventListener('click', function() {
                        const mode = this.dataset.runmode;
                        // Update visual state
                        document.querySelectorAll('[data-runmode]').forEach(function(o) {
                            o.classList.remove('active');
                        });
                        this.classList.add('active');
                        // Save preference (will be used by code editor's setRunMode)
                        localStorage.setItem('nos-run-mode', mode);
                        // Dispatch event to notify code editor section
                        window.dispatchEvent(new CustomEvent('run-mode-changed', { detail: { mode: mode } }));
                        closeAllMenus();
                    });
                });

                // Restore saved preferences
                const savedTheme = localStorage.getItem('nos-theme');
                if (savedTheme && themes[savedTheme]) {
                    applyTheme(savedTheme);
                }

                const savedAutosave = localStorage.getItem('nos-autosave');
                if (savedAutosave === 'true') {
                    menuState.autosaveEnabled = true;
                    const btn = document.getElementById('menu-autosave');
                    if (btn) btn.classList.add('active');
                }

                const savedCompactView = localStorage.getItem('nos-compact-view');
                if (savedCompactView === 'true') {
                    menuState.compactViewEnabled = true;
                    document.body.classList.add('compact-view');
                    const btn = document.getElementById('menu-compact-view');
                    if (btn) btn.classList.add('active');
                }
                
                // Restore saved run mode
                const savedRunMode = localStorage.getItem('nos-run-mode') || 'direct';
                document.querySelectorAll('[data-runmode]').forEach(function(opt) {
                    opt.classList.toggle('active', opt.dataset.runmode === savedRunMode);
                });

                // Keyboard shortcut: Ctrl+Shift+N for new window
                document.addEventListener('keydown', function(e) {
                    if (e.ctrlKey && e.shiftKey && e.key === 'N') {
                        e.preventDefault();
                        window.open(window.location.href, '_blank');
                    }
                    // Ctrl+\ for split view toggle
                    if (e.ctrlKey && e.key === '\\') {
                        e.preventDefault();
                        toggleSplitView();
                    }
                });

                // Split View toggle
                const btnSplitView = document.getElementById('menu-split-view');
                if (btnSplitView) {
                    btnSplitView.addEventListener('click', function() {
                        toggleSplitView();
                        closeAllMenus();
                    });
                }

                // Restore split view preference
                const savedSplitView = localStorage.getItem('nos-split-view');
                if (savedSplitView === 'true') {
                    menuState.splitViewEnabled = true;
                    document.body.classList.add('layout-split');
                    const btn = document.getElementById('menu-split-view');
                    if (btn) btn.classList.add('active');
                    initSplitResizer();
                    restoreSplitRatio();
                    // Sync content after a short delay to ensure console is initialized
                    setTimeout(function() {
                        syncContentToSplit();
                    }, 500);
                }
            }

            // Toggle Split View
            function toggleSplitView() {
                menuState.splitViewEnabled = !menuState.splitViewEnabled;
                document.body.classList.toggle('layout-split', menuState.splitViewEnabled);
                
                const btn = document.getElementById('menu-split-view');
                if (btn) {
                    btn.classList.toggle('active', menuState.splitViewEnabled);
                }
                
                localStorage.setItem('nos-split-view', menuState.splitViewEnabled);
                
                if (menuState.splitViewEnabled) {
                    initSplitResizer();
                    restoreSplitRatio();
                    // Sync content to split panels
                    syncContentToSplit();
                }
            }

            // Initialize split resizer drag
            function initSplitResizer() {
                const resizer = document.getElementById('split-resizer');
                const leftPanel = document.getElementById('split-panel-console');
                const rightPanel = document.getElementById('split-panel-code');
                const container = document.getElementById('split-container');
                
                if (!resizer || !leftPanel || !rightPanel || !container) return;
                
                let isDragging = false;
                
                resizer.addEventListener('mousedown', function(e) {
                    isDragging = true;
                    resizer.classList.add('dragging');
                    document.body.style.cursor = 'col-resize';
                    document.body.style.userSelect = 'none';
                    e.preventDefault();
                });
                
                document.addEventListener('mousemove', function(e) {
                    if (!isDragging) return;
                    
                    const containerRect = container.getBoundingClientRect();
                    const containerWidth = containerRect.width;
                    const offsetX = e.clientX - containerRect.left;
                    
                    // Calculate percentages (min 15%, max 85%)
                    let leftPercent = (offsetX / containerWidth) * 100;
                    leftPercent = Math.max(15, Math.min(85, leftPercent));
                    const rightPercent = 100 - leftPercent;
                    
                    leftPanel.style.flex = '0 0 ' + leftPercent + '%';
                    rightPanel.style.flex = '0 0 ' + rightPercent + '%';
                    
                    // Save ratio
                    localStorage.setItem('nos-split-ratio', leftPercent);
                });
                
                document.addEventListener('mouseup', function() {
                    if (isDragging) {
                        isDragging = false;
                        resizer.classList.remove('dragging');
                        document.body.style.cursor = '';
                        document.body.style.userSelect = '';
                    }
                });
            }

            // Restore split ratio from localStorage
            function restoreSplitRatio() {
                const savedRatio = localStorage.getItem('nos-split-ratio');
                if (savedRatio) {
                    const leftPercent = parseFloat(savedRatio);
                    const rightPercent = 100 - leftPercent;
                    const leftPanel = document.getElementById('split-panel-console');
                    const rightPanel = document.getElementById('split-panel-code');
                    
                    if (leftPanel && rightPanel) {
                        leftPanel.style.flex = '0 0 ' + leftPercent + '%';
                        rightPanel.style.flex = '0 0 ' + rightPercent + '%';
                    }
                }
            }

            // Sync content to split panels (placeholder - actual content sync handled elsewhere)
            function syncContentToSplit() {
                // The console output and code editor are managed by their respective modules
                // This triggers an event that other modules can listen to
                window.dispatchEvent(new CustomEvent('split-view-enabled'));
            }

            // Start when DOM is ready
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>

    <script>
        /* ==========================================================================
           Explorer Panel - File Tree & Outline
           ========================================================================== */
        (function() {
            'use strict';

            const explorerState = {
                isOpen: false,
                fileTree: null,
                currentFile: null,
                currentOutline: []
            };

            const explorerDom = {
                offcanvas: document.getElementById('explorer-offcanvas'),
                backdrop: document.getElementById('explorer-backdrop'),
                closeBtn: document.getElementById('explorer-close'),
                menuToggle: document.getElementById('menu-explorer'),
                fileTree: document.getElementById('file-tree'),
                outlineTree: document.getElementById('outline-tree'),
                resizer: document.getElementById('explorer-resizer'),
                filesPanel: document.getElementById('explorer-files-panel'),
                outlinePanel: document.getElementById('explorer-outline-panel')
            };

            // Toggle explorer panel
            function toggleExplorer() {
                explorerState.isOpen = !explorerState.isOpen;
                
                if (explorerState.isOpen) {
                    explorerDom.offcanvas.classList.add('open');
                    explorerDom.backdrop.classList.add('open');
                    explorerDom.menuToggle.classList.add('checked');
                    
                    // Load file tree if not loaded
                    if (!explorerState.fileTree) {
                        loadFileTree();
                    }
                } else {
                    explorerDom.offcanvas.classList.remove('open');
                    explorerDom.backdrop.classList.remove('open');
                    explorerDom.menuToggle.classList.remove('checked');
                }
            }

            // Load file tree from API
            async function loadFileTree() {
                explorerDom.fileTree.innerHTML = '<div class="tree-loading">Loading files</div>';
                
                try {
                    const response = await fetch('/api/plugins/tree');
                    if (!response.ok) throw new Error('Failed to load file tree');
                    
                    const data = await response.json();
                    explorerState.fileTree = data.tree;
                    renderFileTree(data.tree);
                } catch (error) {
                    console.error('Failed to load file tree:', error);
                    explorerDom.fileTree.innerHTML = '<div class="tree-loading" style="color: var(--log-error);">Failed to load files</div>';
                }
            }

            // Label mappings for display (folder name -> display label)
            const folderLabelMap = {
                'workflows': 'models'
            };

            // Render file tree recursively
            function renderFileTree(tree, container = null, depth = 0) {
                if (!container) {
                    explorerDom.fileTree.innerHTML = '';
                    container = explorerDom.fileTree;
                }

                tree.forEach(item => {
                    if (item.type === 'folder') {
                        const folderEl = document.createElement('div');
                        folderEl.className = 'tree-folder';
                        folderEl.dataset.path = item.path;
                        
                        // Use mapped label or original name
                        const displayLabel = folderLabelMap[item.name] || item.name;
                        
                        const itemEl = document.createElement('div');
                        itemEl.className = 'tree-item';
                        itemEl.innerHTML = `
                            ${'<span class="tree-indent"></span>'.repeat(depth)}
                            <span class="tree-icon folder">📁</span>
                            <span class="tree-label">${displayLabel}</span>
                        `;
                        
                        itemEl.addEventListener('click', () => {
                            folderEl.classList.toggle('expanded');
                            const icon = itemEl.querySelector('.tree-icon');
                            icon.textContent = folderEl.classList.contains('expanded') ? '📂' : '📁';
                            icon.classList.toggle('folder-open', folderEl.classList.contains('expanded'));
                        });
                        
                        folderEl.appendChild(itemEl);
                        
                        if (item.children && item.children.length > 0) {
                            const childContainer = document.createElement('div');
                            childContainer.className = 'tree-folder-children';
                            renderFileTree(item.children, childContainer, depth + 1);
                            folderEl.appendChild(childContainer);
                        }
                        
                        container.appendChild(folderEl);
                    } else if (item.type === 'file') {
                        const fileEl = document.createElement('div');
                        fileEl.className = 'tree-item';
                        fileEl.dataset.path = item.path;
                        fileEl.dataset.modulePath = item.module_path || '';
                        fileEl.innerHTML = `
                            ${'<span class="tree-indent"></span>'.repeat(depth)}
                            <span class="tree-icon file-python">🐍</span>
                            <span class="tree-label">${item.name}</span>
                        `;
                        
                        fileEl.addEventListener('click', () => selectFile(fileEl, item));
                        container.appendChild(fileEl);
                    }
                });
            }

            // Select a file
            function selectFile(element, item) {
                // Remove previous selection
                explorerDom.fileTree.querySelectorAll('.tree-item.selected').forEach(el => {
                    el.classList.remove('selected');
                });
                element.classList.add('selected');
                
                explorerState.currentFile = item;
                
                // Open file in editor via console command
                if (item.module_path) {
                    // Determine if it's a node or workflow based on path
                    const pluginType = item.module_path.includes('.workflows.') ? 'workflow' : 'node';
                    const cmd = `open ${pluginType} ${item.module_path}`;
                    window.dispatchEvent(new CustomEvent('console-command', { detail: { command: cmd } }));
                }
                
                // Load outline for this file
                loadOutline(item.path);
            }

            // Load outline from file content
            async function loadOutline(filePath) {
                explorerDom.outlineTree.innerHTML = '<div class="tree-loading">Parsing</div>';
                
                try {
                    const response = await fetch(`/api/plugins/outline?path=${encodeURIComponent(filePath)}`);
                    if (!response.ok) throw new Error('Failed to load outline');
                    
                    const data = await response.json();
                    explorerState.currentOutline = data.outline;
                    renderOutline(data.outline);
                } catch (error) {
                    console.error('Failed to load outline:', error);
                    explorerDom.outlineTree.innerHTML = '<div class="outline-empty">Could not parse file</div>';
                }
            }

            // Render outline
            function renderOutline(outline) {
                if (!outline || outline.length === 0) {
                    explorerDom.outlineTree.innerHTML = '<div class="outline-empty">No symbols found</div>';
                    return;
                }

                explorerDom.outlineTree.innerHTML = '';
                
                outline.forEach(item => {
                    const el = document.createElement('div');
                    el.className = 'outline-item';
                    el.dataset.line = item.line;
                    
                    let icon = 'V';
                    let iconClass = 'variable';
                    
                    if (item.type === 'class') {
                        icon = 'C';
                        iconClass = 'class';
                    } else if (item.type === 'method') {
                        icon = 'M';
                        iconClass = 'method';
                    } else if (item.type === 'function') {
                        icon = 'F';
                        iconClass = 'function';
                    }
                    
                    const indent = '<span class="tree-indent"></span>'.repeat(item.depth || 0);
                    
                    el.innerHTML = `
                        ${indent}
                        <span class="outline-icon ${iconClass}">${icon}</span>
                        <span class="outline-label">${item.name}</span>
                        <span class="outline-line">:${item.line}</span>
                    `;
                    
                    el.addEventListener('click', () => {
                        // Navigate to line in editor
                        window.dispatchEvent(new CustomEvent('editor-goto-line', { detail: { line: item.line } }));
                        
                        // Update active state
                        explorerDom.outlineTree.querySelectorAll('.outline-item.active').forEach(i => {
                            i.classList.remove('active');
                        });
                        el.classList.add('active');
                    });
                    
                    explorerDom.outlineTree.appendChild(el);
                });
            }

            // Update outline when code changes
            function updateOutlineFromCode(code) {
                if (!code) {
                    explorerDom.outlineTree.innerHTML = '<div class="outline-empty">Open a file to see its outline</div>';
                    return;
                }

                const outline = parseCodeOutline(code);
                explorerState.currentOutline = outline;
                renderOutline(outline);
            }

            // Client-side Python outline parser
            function parseCodeOutline(code) {
                const outline = [];
                const lines = code.split('\n');
                let currentClass = null;

                lines.forEach((line, index) => {
                    const lineNum = index + 1;
                    
                    // Match class definition
                    const classMatch = line.match(/^class\s+(\w+)/);
                    if (classMatch) {
                        currentClass = classMatch[1];
                        outline.push({
                            type: 'class',
                            name: classMatch[1],
                            line: lineNum,
                            depth: 0
                        });
                        return;
                    }
                    
                    // Match function/method definition
                    const funcMatch = line.match(/^(\s*)def\s+(\w+)\s*\(/);
                    if (funcMatch) {
                        const indent = funcMatch[1].length;
                        const name = funcMatch[2];
                        const isMethod = indent > 0 && currentClass;
                        
                        outline.push({
                            type: isMethod ? 'method' : 'function',
                            name: name,
                            line: lineNum,
                            depth: isMethod ? 1 : 0,
                            parent: isMethod ? currentClass : null
                        });
                    }
                });

                return outline;
            }

            // Initialize panel resizer
            function initExplorerResizer() {
                const resizer = explorerDom.resizer;
                const topPanel = explorerDom.filesPanel;
                const bottomPanel = explorerDom.outlinePanel;
                const container = document.querySelector('.explorer-content');
                
                if (!resizer || !topPanel || !bottomPanel || !container) return;
                
                let isDragging = false;
                
                resizer.addEventListener('mousedown', (e) => {
                    isDragging = true;
                    resizer.classList.add('dragging');
                    document.body.style.cursor = 'ns-resize';
                    document.body.style.userSelect = 'none';
                    e.preventDefault();
                });
                
                document.addEventListener('mousemove', (e) => {
                    if (!isDragging) return;
                    
                    const containerRect = container.getBoundingClientRect();
                    const offsetY = e.clientY - containerRect.top;
                    const containerHeight = containerRect.height;
                    
                    let topPercent = (offsetY / containerHeight) * 100;
                    topPercent = Math.max(20, Math.min(80, topPercent));
                    const bottomPercent = 100 - topPercent;
                    
                    topPanel.style.flex = `0 0 ${topPercent}%`;
                    bottomPanel.style.flex = `0 0 ${bottomPercent}%`;
                    
                    localStorage.setItem('nos-explorer-ratio', topPercent);
                });
                
                document.addEventListener('mouseup', () => {
                    if (isDragging) {
                        isDragging = false;
                        resizer.classList.remove('dragging');
                        document.body.style.cursor = '';
                        document.body.style.userSelect = '';
                    }
                });
                
                // Restore saved ratio
                const savedRatio = localStorage.getItem('nos-explorer-ratio');
                if (savedRatio) {
                    const ratio = parseFloat(savedRatio);
                    topPanel.style.flex = `0 0 ${ratio}%`;
                    bottomPanel.style.flex = `0 0 ${100 - ratio}%`;
                }
            }

            // Initialize panel collapse
            function initPanelCollapse() {
                document.querySelectorAll('.explorer-panel-header').forEach(header => {
                    header.addEventListener('click', () => {
                        const panel = header.closest('.explorer-panel');
                        panel.classList.toggle('collapsed');
                    });
                });
            }

            // Initialize
            function init() {
                // Menu toggle
                if (explorerDom.menuToggle) {
                    explorerDom.menuToggle.addEventListener('click', () => {
                        toggleExplorer();
                    });
                }
                
                // Close button
                if (explorerDom.closeBtn) {
                    explorerDom.closeBtn.addEventListener('click', toggleExplorer);
                }
                
                // Backdrop click to close
                if (explorerDom.backdrop) {
                    explorerDom.backdrop.addEventListener('click', toggleExplorer);
                }
                
                // Keyboard shortcut (Ctrl+E)
                document.addEventListener('keydown', (e) => {
                    if (e.ctrlKey && e.key === 'e') {
                        e.preventDefault();
                        toggleExplorer();
                    }
                });
                
                // Listen for code changes to update outline
                window.addEventListener('code-editor-loaded', (e) => {
                    if (e.detail && e.detail.content) {
                        updateOutlineFromCode(e.detail.content);
                    }
                });
                
                // Listen for editor content changes
                window.addEventListener('code-editor-change', () => {
                    if (window.__codeEditor) {
                        updateOutlineFromCode(window.__codeEditor.value);
                    }
                });
                
                initExplorerResizer();
                initPanelCollapse();
            }

            // Start
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

            // Expose for external access
            window.explorerPanel = {
                toggle: toggleExplorer,
                loadFileTree: loadFileTree,
                updateOutline: updateOutlineFromCode
            };
        })();

            /**
             * Format timestamp for display
             * @param {number|string} ts - Unix timestamp or ISO string

             */
            function formatTime(ts) {
                const date = typeof ts === 'number' 
                    ? new Date(ts * 1000) 
                    : new Date(ts);
                return date.toLocaleTimeString('en-US', { 
                    hour12: false,
                    hour: '2-digit',
                    minute: '2-digit',

            /**

             */
            function escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            /**
             * Format JSON for display
             * @param {object} obj - Object to format
             * @returns {string} Formatted JSON string
             */
            function formatJson(obj) {
                try {
                    return JSON.stringify(obj, null, 2);
                } catch (e) {
                    return String(obj);
                }
            }

            /**

            function isScrolledToBottom() {

                const entry = document.createElement('div');
                entry.className = 'log-entry';
                
                const level = (data.level || 'info').toLowerCase();
                entry.setAttribute('data-level', level);
                const event = data.event || 'custom';
                const timestamp = data.timestamp || data.datetime || Date.now() / 1000;
                const message = data.message || '';
                const nodeId = data.node_id;
                const workflowId = data.workflow_id;
                
                // Build source identifier
                let source = '';
                if (nodeId) source = `node:${nodeId}`;
                else if (workflowId) source = `workflow:${workflowId}`;

                // Always show toggle for full JSON payload (data always has content)
                const hasData = data && Object.keys(data).length > 0;

                // Render HTML with toggle for full JSON
                entry.innerHTML = `
                    <span class="log-timestamp">${formatTime(timestamp)}</span>
                    <span class="log-level log-level--${level}">${escapeHtml(level)}</span>
                    <span class="log-event log-event--${event}">${escapeHtml(event)}</span>

                    <span class="log-message">${escapeHtml(message)}</span>
                    ${hasData ? `<span class="log-toggle" data-action="toggle" title="Show full JSON payload">▶</span>` : ''}
                    ${hasData ? `<div class="log-details"><pre class="log-data">${escapeHtml(formatJson(data))}</pre></div>` : ''}
                `;

                // Toggle is handled via event delegation in init() for both main and split consoles

                return entry;
            }

            /**
             * Apply log level filters to all entries
             */
            function applyLogFilters() {
                const allEntries = document.querySelectorAll('.log-entry[data-level]');
                allEntries.forEach(function(entry) {
                    const level = entry.getAttribute('data-level');
                    if (level && state.filterLevels[level] === false) {
                        entry.classList.add('filtered');
                    } else {
                        entry.classList.remove('filtered');
                    }
                });
            }

            /**
             * Add a log entry to the console
             * @param {object} data - Event data
             */
            function addLogEntry(data) {
                // Hide empty state
                if (dom.empty) {
                    dom.empty.style.display = 'none';
                }

                // Check if we should auto-scroll (before adding)
                const shouldScroll = state.autoScroll && isScrolledToBottom();

                // Create entry
                const entry = createLogEntry(data);
                
                // Apply filter if level is filtered out
                const level = data.level || 'info';
                if (state.filterLevels[level] === false) {
                    entry.classList.add('filtered');
                }
                
                // Insert before prompt (if exists) to keep prompt at bottom
                if (state.currentPrompt) {
                    dom.output.insertBefore(entry, state.currentPrompt);
                } else {
                    dom.output.appendChild(entry);

                // Also add to split output if exists and split view is active
                if (dom.splitOutput && document.body.classList.contains('layout-split')) {
                    const splitEntry = entry.cloneNode(true);
                    dom.splitOutput.appendChild(splitEntry);
                    if (state.autoScroll) {
                        dom.splitOutput.scrollTop = dom.splitOutput.scrollHeight;

                // Update count
                state.eventCount++;

                // Prune old entries if needed
                while (dom.output.children.length > CONFIG.maxEntries + 1) { // +1 for empty state
                    const first = dom.output.querySelector('.log-entry');
                    if (first) first.remove();
                }
                
                // Also prune split output

                `;

                const input = line.querySelector('.cmd-input');

                // Handle keyboard events
                function handleKeydown(e, inputEl) {
                    // Ctrl+C: Stop current execution
                    if (e.ctrlKey && e.key === 'c') {
                        e.preventDefault();
                        if (state.currentExecutionId) {
                            executeCommand('stop ' + state.currentExecutionId);
                            appendOutput('info', '^C (sending stop for: ' + state.currentExecutionId + ')');
                        } else {
                            appendOutput('warning', '^C (no active execution to stop)');
                        }
                        return;
                    }
                    
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        const cmd = inputEl.value.trim();
                        if (cmd) {
                            executeCommand(cmd);
                        }
                    } else if (e.key === 'ArrowUp') {
                        // Navigate history up
                        e.preventDefault();
                        if (state.cmdHistory.length > 0) {
                            if (state.cmdHistoryIndex < state.cmdHistory.length - 1) {
                                state.cmdHistoryIndex++;
                            }
                            const histCmd = state.cmdHistory[state.cmdHistory.length - 1 - state.cmdHistoryIndex];
                            inputEl.value = histCmd;
                            // Sync to other input
                            syncPromptInputs(histCmd);
                        }
                    } else if (e.key === 'ArrowDown') {
                        // Navigate history down
                        e.preventDefault();
                        if (state.cmdHistoryIndex > 0) {
                            state.cmdHistoryIndex--;
                            const histCmd = state.cmdHistory[state.cmdHistory.length - 1 - state.cmdHistoryIndex];
                            inputEl.value = histCmd;

                        if (state.currentPrompt) {

                    dom.splitOutput.appendChild(splitLine);

            function showCommandOutput(text, type = 'info') {

            /**
             * Render console output based on format type
             * 
             * Supported formats:
             * - text: Plain text (default)
             * - json: Formatted JSON with syntax highlighting
             * - html: Raw HTML content (sanitized)
             * - table: Tabular data display
             * - code: Code block with syntax highlighting
             * - progress: Progress indicator (spinner + message)
             * 
             * @param {string} message - Output message
             * @param {string} type - Output type (info, success, error)
             * @param {string} format - Output format (text, json, html, table, code, progress)
             * @param {any} data - Optional additional data
             */
            function renderConsoleOutput(message, type, format, data) {
                switch (format) {
                    case 'json':
                        renderJsonOutput(message, type, data);
                        break;
                    case 'html':
                        renderHtmlOutput(message, type);
                        break;
                    case 'table':
                        renderTableOutput(message, type, data);
                        break;
                    case 'code':
                        renderCodeOutput(message, type, data);
                        break;
                    case 'progress':
                        renderProgressOutput(message, type);
                        break;
                    case 'tree':
                        renderTreeOutput(message, type, data);
                        break;
                    case 'text':
                    default:
                        showCommandOutput(message, type);
                        if (data) {
                            try {
                                const dataStr = JSON.stringify(data, null, 2);
                                showCommandOutput(dataStr, 'info');
                            } catch (e) {}
                        }
                        break;
                }
            }

            /**
             * Render JSON formatted output
             */
            function renderJsonOutput(message, type, data) {
                showCommandOutput(message, type);
                if (data) {
                    const output = document.createElement('div');
                    output.className = 'cmd-output cmd-output--json';
                    try {
                        const formatted = JSON.stringify(data, null, 2);
                        output.innerHTML = `<pre class="json-block">${syntaxHighlightJson(formatted)}</pre>`;
                    } catch (e) {
                        output.textContent = String(data);
                    }
                    insertOutput(output);
                }
            }

            /**
             * Render HTML formatted output (sanitized)
             */
            function renderHtmlOutput(message, type) {
                const output = document.createElement('div');
                output.className = `cmd-output cmd-output--html ${type}`;
                output.innerHTML = sanitizeHtml(message);
                insertOutput(output);
            }

            /**
             * Render table formatted output
             */
            function renderTableOutput(message, type, data) {
                showCommandOutput(message, type);
                if (data && typeof data === 'object') {
                    const output = document.createElement('div');
                    output.className = 'cmd-output cmd-output--table';
                    output.innerHTML = `<span class="table-count">${data.count !== undefined ? `(${data.count} items)` : ''}</span>`;
                    insertOutput(output);
                }
            }

            /**
             * Render code block output
             */
            function renderCodeOutput(message, type, data) {
                const output = document.createElement('div');
                output.className = `cmd-output cmd-output--code ${type}`;
                const lang = data?.language || 'plaintext';
                output.innerHTML = `<pre class="code-block" data-lang="${escapeHtml(lang)}">${escapeHtml(message)}</pre>`;
                insertOutput(output);
            }

            /**
             * Render progress indicator output
             */
            function renderProgressOutput(message, type) {
                const output = document.createElement('div');
                output.className = `cmd-output cmd-output--progress ${type}`;
                output.innerHTML = `<span class="progress-spinner"></span><span class="progress-message">${escapeHtml(message)}</span>`;
                insertOutput(output);
                // Track progress element for removal when result arrives
                state.progressElements.push(output);
            }

            /**
             * Render tree/directory structure output
             */
            function renderTreeOutput(message, type, data) {
                const output = document.createElement('div');
                output.className = `cmd-output cmd-output--tree ${type}`;
                output.innerHTML = `<pre>${escapeHtml(message)}</pre>`;
                insertOutput(output);
            }

            /**
             * Remove all progress indicators (called when final result arrives)
             */
            function clearProgressIndicators() {
                state.progressElements.forEach(el => {
                    if (el && el.parentNode) {
                        el.parentNode.removeChild(el);
                    }
                });
                state.progressElements = [];
                
                // Also remove from split output
                if (dom.splitOutput) {
                    const splitProgress = dom.splitOutput.querySelectorAll('.cmd-output--progress');
                    splitProgress.forEach(el => el.remove());
                }
            }

            /**
             * Insert output element into console
             */
            function insertOutput(element) {
                if (state.currentPrompt) {
                    dom.output.insertBefore(element, state.currentPrompt);
                } else {
                    dom.output.appendChild(element);
                }
                
                // Also add to split output if exists
                if (dom.splitOutput) {
                    const splitElement = element.cloneNode(true);
                    dom.splitOutput.appendChild(splitElement);
                    if (state.autoScroll) {
                        dom.splitOutput.scrollTop = dom.splitOutput.scrollHeight;
                    }
                }
                
                if (state.autoScroll) {
                    scrollToBottom();
                }
            }

            /**
             * Basic JSON syntax highlighting
             */
            function syntaxHighlightJson(json) {
                return json
                    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                    .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+-]?\d+)?)/g, 
                        function (match) {
                            let cls = 'json-number';
                            if (/^"/.test(match)) {
                                cls = /:$/.test(match) ? 'json-key' : 'json-string';
                            } else if (/true|false/.test(match)) {
                                cls = 'json-boolean';
                            } else if (/null/.test(match)) {
                                cls = 'json-null';
                            }
                            return '<span class="' + cls + '">' + match + '</span>';
                        });
            }

            /**
             * Basic HTML sanitization (allow safe tags only)
             */
            function sanitizeHtml(html) {
                const allowedTags = ['b', 'i', 'u', 'strong', 'em', 'span', 'br', 'p', 'a', 'code', 'pre'];
                const div = document.createElement('div');
                div.innerHTML = html;
                
                const walk = (node) => {
                    const children = [...node.childNodes];
                    children.forEach(child => {
                        if (child.nodeType === 1) {
                            if (!allowedTags.includes(child.tagName.toLowerCase())) {
                                const text = document.createTextNode(child.textContent);
                                node.replaceChild(text, child);
                            } else {
                                // Remove dangerous attributes
                                [...child.attributes].forEach(attr => {
                                    if (attr.name.startsWith('on') || attr.name === 'style') {
                                        child.removeAttribute(attr.name);
                                    }
                                    if (attr.name === 'href' && !attr.value.startsWith('http')) {
                                        child.removeAttribute(attr.name);
                                    }
                                });
                                walk(child);
                            }
                        }
                    });
                };
                walk(div);
                return div.innerHTML;
            }

            /**
             * Execute a command via Socket.IO
             * 
             * Communication flow (all via Socket.IO):
             * 1. Client emits 'console_command' with { raw_command: "..." }
             * 2. Server validates using console module
             * 3. Server emits 'console_output' with result or error
             * 
             * @param {string} cmd - Command string
             */
            function executeCommand(cmd) {
                // Add to history
                state.cmdHistory.push(cmd);
                if (state.cmdHistory.length > 100) {
                    state.cmdHistory.shift();
                }

                // Show executed command
                showExecutedCommand(cmd);

                // Remove current prompt (will be recreated after response)
                if (state.currentPrompt) {
                    state.currentPrompt.remove();
                    state.currentPrompt = null;
                }

                // Handle local-only commands (no server needed)
                const parts = cmd.split(/\s+/);
                const command = parts[0].toLowerCase();

                if (command === 'history') {
                    // Local history command
                    if (state.cmdHistory.length === 0) {
                        showCommandOutput('No command history', 'info');
                    } else {
                        const historyText = state.cmdHistory
                            .map((c, i) => `  ${i + 1}. ${c}`)
                            .join('\n');
                        showCommandOutput(`Command history:\n${historyText}`, 'info');
                    }
                    if (state.connected) createPrompt();
                    return;
                }

                // Check connection for server commands
                if (!state.connected) {
                    showCommandOutput('Error: Not connected to server', 'error');
                    return;
                }

                // Emit command via Socket.IO
                // Server will validate and respond with console_output
                state.socket.emit('console_command', { raw_command: cmd });
                
                // Note: prompt will be recreated when console_output is received
            }

            // ------------------------------------
            // Socket.IO Connection
            // ------------------------------------

            /**
             * Initialize Socket.IO connection
             */
            function initSocket() {
                // Close existing connection
                if (state.socket) {
                    state.socket.disconnect();
                }

                // Create new connection
                // Note: Let Socket.IO auto-negotiate transport (polling first for Waitress compatibility)
                state.socket = io({
                    reconnection: true,
                    reconnectionDelay: 1000,
                    reconnectionAttempts: 10
                });

                // Connection events
                state.socket.on('connect', () => {
                    state.connected = true;
                    updateConnectionStatus(true);
                    addSystemMessage('Connected to server', 'success');
                    // Create command prompt when connected
                    createPrompt();
                });

                state.socket.on('disconnect', (reason) => {
                    state.connected = false;
                    updateConnectionStatus(false);
                    // Remove prompt when disconnected
                    if (state.currentPrompt) {
                        state.currentPrompt.remove();
                        state.currentPrompt = null;
                    }
                    addSystemMessage(`Disconnected: ${reason}`, 'warning');
                });

                state.socket.on('connect_error', (error) => {
                    addSystemMessage(`Connection error: ${error.message}`, 'error');
                });

                // Listen for execution logs
                state.socket.on('execution_log', (data) => {
                    addLogEntry(data);
                });

                // Listen for console output (from console commands)
                state.socket.on('console_output', (data) => {
                    // Handle different output types
                    if (data.type === 'clear') {
                        handleClear();
                        return;
                    }
                    
                    // Map console output types to our output styles
                    const typeMap = {
                        'info': 'info',
                        'success': 'success',
                        'error': 'error',
                        'warning': 'error'
                    };
                    const outputType = typeMap[data.type] || 'info';
                    const format = data.format || 'text';
                    
                    // Track execution_id for Ctrl+C stop command
                    if (format === 'progress' && data.data && data.data.execution_id) {
                        state.currentExecutionId = data.data.execution_id;
                    }
                    
                    // Remove progress indicators when final result arrives
                    if (format !== 'progress') {
                        clearProgressIndicators();
                        // Clear execution tracking when execution completes
                        if (data.type === 'success' || data.type === 'error') {
                            state.currentExecutionId = null;
                        }
                    }
                    
                    // Check for create/open command success - load code into editor
                    if (data.type === 'success' && data.data && data.data.action) {
                        const action = data.data.action;
                        if ((action === 'create_node' || action === 'create_workflow' ||
                             action === 'open_node' || action === 'open_workflow') && data.data.content) {
                            loadCreatedCodeIntoEditor(data.data);
                        }
                    }
                    
                    // Render output based on format type
                    renderConsoleOutput(data.message, outputType, format, data.data);
                    
                    // Recreate prompt after receiving output (except for progress)
                    if (format !== 'progress' && state.connected && !state.currentPrompt) {
                        createPrompt();
                    }
                });

                // Listen for execution requests (bidirectional)
                state.socket.on('execution_request', (data) => {
                    addLogEntry({
                        event: 'execution_request',
                        level: 'warning',
                        message: `Server requests: ${data.event_type}`,
                        request_id: data.request_id,
                        data: data.data
                    });
                });
            }

            /**
             * Update connection status UI
             * @param {boolean} connected
             */
            function updateConnectionStatus(connected) {
                dom.statusDot.classList.toggle('connected', connected);
                dom.statusText.textContent = connected ? 'Connected' : 'Disconnected';
            }

            // ------------------------------------
            // UI Event Handlers
            // ------------------------------------

            /**
             * Clear console output
             */
            function handleClear() {
                // Remove all entries (logs, commands, outputs)
                const entries = dom.output.querySelectorAll('.log-entry, .cmd-executed, .cmd-output, .cmd-line');
                entries.forEach(e => e.remove());
                state.currentPrompt = null;
                state.splitPrompt = null;
                
                // Also clear split output
                if (dom.splitOutput) {
                    dom.splitOutput.innerHTML = '';
                }
                
                // Reset count
                state.eventCount = 0;
                
                // Show empty state only if not connected
                if (!state.connected && dom.empty) {
                    dom.empty.style.display = 'flex';
                }
                
                addSystemMessage('Console cleared', 'debug');
                
                // Recreate prompt if connected
                if (state.connected) {
                    createPrompt();
                }
            }

            /**
             * Toggle auto-scroll
             */
            function handleToggleScroll() {
                state.autoScroll = !state.autoScroll;
                dom.btnScroll.classList.toggle('active', state.autoScroll);
                dom.btnScroll.title = state.autoScroll ? 'Auto-scroll: ON' : 'Auto-scroll: OFF';
                
                if (state.autoScroll) {
                    scrollToBottom();
                }
            }

            /**
             * Reconnect to server
             */
            function handleReconnect() {
                addSystemMessage('Reconnecting...', 'info');
                initSocket();
            }

            /**
             * Sync console output to split view panel
             */
            function syncConsoleToSplit() {
                if (!dom.splitOutput || !dom.output) return;
                
                // Clear split output first
                dom.splitOutput.innerHTML = '';
                state.splitPrompt = null;
                
                // Copy all entries from main output to split output
                const entries = dom.output.querySelectorAll('.log-entry, .cmd-executed, .cmd-output, .cmd-line');
                entries.forEach(function(entry) {
                    // Don't copy the current prompt (cmd-line with input)
                    if (entry.classList.contains('cmd-line') && entry.querySelector('input')) {
                        return;
                    }
                    const clone = entry.cloneNode(true);
                    dom.splitOutput.appendChild(clone);
                });
                
                // Create prompt in split view if connected
                if (state.connected && state.currentPrompt) {
                    createSplitPrompt();
                }
                
                // Scroll to bottom
                if (state.autoScroll) {
                    dom.splitOutput.scrollTop = dom.splitOutput.scrollHeight;
                }
            }

            // ------------------------------------
            // Initialization
            // ------------------------------------

            function init() {
                // Bind button events
                dom.btnClear.addEventListener('click', handleClear);
                dom.btnScroll.addEventListener('click', handleToggleScroll);

                // Listen for menu reconnect event
                window.addEventListener('menu-reconnect', handleReconnect);
                
                // Listen for console commands from explorer panel
                window.addEventListener('console-command', function(e) {
                    if (e.detail && e.detail.command) {
                        executeCommand(e.detail.command);
                    }
                });
                
                // Event delegation for log-toggle clicks (works for cloned elements too)
                function handleToggleClick(e) {
                    const toggle = e.target.closest('.log-toggle');
                    if (toggle) {
                        e.stopPropagation();
                        const entry = toggle.closest('.log-entry');
                        if (entry) {
                            entry.classList.toggle('expanded');
                            toggle.textContent = entry.classList.contains('expanded') ? '▼' : '▶';
                            toggle.title = entry.classList.contains('expanded') ? 'Hide JSON payload' : 'Show full JSON payload';
                        }
                    }
                }
                
                // Attach to main console output
                if (dom.output) {
                    dom.output.addEventListener('click', handleToggleClick);
                }
                
                // Attach to split console output
                if (dom.splitOutput) {
                    dom.splitOutput.addEventListener('click', handleToggleClick);
                }

                // Bind split view button events
                if (dom.splitBtnClear) {
                    dom.splitBtnClear.addEventListener('click', handleClear);
                }
                if (dom.splitBtnScroll) {
                    dom.splitBtnScroll.addEventListener('click', function() {
                        handleToggleScroll();
                        // Sync active state with split button
                        this.classList.toggle('active', state.autoScroll);
                    });
                }
                // Filter dropdown toggle functions
                function closeAllFilterDropdowns() {
                    if (dom.filterDropdown) dom.filterDropdown.classList.remove('open');
                    if (dom.splitFilterDropdown) dom.splitFilterDropdown.classList.remove('open');
                }

                function toggleFilterDropdown(dropdown, otherDropdown) {
                    if (otherDropdown) otherDropdown.classList.remove('open');
                    if (dropdown) dropdown.classList.toggle('open');
                }

                function syncFilterCheckboxes(sourceDropdown, targetDropdown) {
                    if (!targetDropdown) return;
                    Object.keys(state.filterLevels).forEach(function(level) {
                        const checkbox = targetDropdown.querySelector(`input[data-level="${level}"]`);
                        if (checkbox) checkbox.checked = state.filterLevels[level];
                    });
                }

                function handleFilterChange(checkbox) {
                    const level = checkbox.getAttribute('data-level');
                    state.filterLevels[level] = checkbox.checked;
                    applyLogFilters();
                    localStorage.setItem('nos-log-filters', JSON.stringify(state.filterLevels));
                    // Sync to other dropdown
                    syncFilterCheckboxes(null, dom.filterDropdown);
                    syncFilterCheckboxes(null, dom.splitFilterDropdown);
                }

                // Main filter button
                if (dom.btnFilter) {
                    dom.btnFilter.addEventListener('click', function(e) {
                        e.stopPropagation();
                        toggleFilterDropdown(dom.filterDropdown, dom.splitFilterDropdown);
                    });
                }

                // Split view filter button
                if (dom.splitBtnFilter) {
                    dom.splitBtnFilter.addEventListener('click', function(e) {
                        e.stopPropagation();
                        toggleFilterDropdown(dom.splitFilterDropdown, dom.filterDropdown);
                    });
                }

                // Filter checkbox change handlers for main dropdown
                if (dom.filterDropdown) {
                    dom.filterDropdown.querySelectorAll('input[type="checkbox"]').forEach(function(checkbox) {
                        checkbox.addEventListener('change', function() {
                            handleFilterChange(this);
                        });
                    });
                }

                // Filter checkbox change handlers for split dropdown
                if (dom.splitFilterDropdown) {
                    dom.splitFilterDropdown.querySelectorAll('input[type="checkbox"]').forEach(function(checkbox) {
                        checkbox.addEventListener('change', function() {
                            handleFilterChange(this);
                        });
                    });
                }

                // Close filter dropdowns when clicking outside
                document.addEventListener('click', function(e) {
                    const container = e.target.closest('.filter-dropdown-container');
                    if (!container) {
                        closeAllFilterDropdowns();
                    }
                });

                // Restore saved filter preferences
                const savedFilters = localStorage.getItem('nos-log-filters');
                if (savedFilters) {
                    try {
                        const filters = JSON.parse(savedFilters);
                        Object.assign(state.filterLevels, filters);
                        // Update checkboxes in both dropdowns
                        syncFilterCheckboxes(null, dom.filterDropdown);
                        syncFilterCheckboxes(null, dom.splitFilterDropdown);
                    } catch (e) {}
                }
                
                // Listen for split view enabled to sync content
                window.addEventListener('split-view-enabled', function() {
                    syncConsoleToSplit();
                });

                // Initialize Socket.IO
                initSocket();

                // Welcome message
                addSystemMessage('Hythera Console initialized', 'info');
            }

            // Start when DOM is ready
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
