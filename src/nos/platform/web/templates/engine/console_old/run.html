<!DOCTYPE html>
<html lang="en" data-theme="{% if request.path.startswith('/redlimon') %}redlemon{% else %}nos{% endif %}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_title }}</title>
    <!-- No terminal-theme.css: run page uses self-contained compact console styles -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='js/socket.js') }}"></script>
    <script src="{{ url_for('static', filename='js/upload_progress.js') }}"></script>
    <script src="{{ url_for('static', filename='js/console/console-run-form.js') }}"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            background: #0c0c0c;
            color: #cccccc;
            line-height: 1.35;
        }
        body {
            display: flex;
            flex-direction: column;
            padding: 0;
        }
        .terminal {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            width: 100%;
        }
        .header {
            flex-shrink: 0;
            border: 1px solid #333;
            border-left: none;
            border-right: none;
            padding: 0.75rem 1rem;
            background: #1a1a1a;
        }
        .header .id { color: #4ec9b0; font-weight: bold; }
        .header .name { color: #9cdcfe; margin-left: 1rem; }
        .header .hint { display: block; font-size: 0.8rem; color: #858585; margin-top: 0.5rem; }
        .cmd-container {
            flex: 1;
            min-height: 0;
            border: 1px solid #333;
            border-left: none;
            border-right: none;
            border-bottom: none;
            background: #0c0c0c;
            padding: 0.75rem;
            overflow-x: auto;
            overflow-y: auto;
            font-size: 0.85em;
            line-height: 1.28;
        }
        .cmd-container * {
            font-size: inherit;
        }
        .cmd-container input, .cmd-container select, .cmd-container textarea {
            padding: 0.2rem 0.35rem;
        }
        .cmd-container .cmd-line {
            display: flex;
            align-items: baseline;
            margin-bottom: 0.25rem;
            flex-wrap: wrap;
            line-height: 1.28;
        }
        .cmd-container .cmd-prompt {
            color: #4ec9b0;
            margin-right: 0.25rem;
            user-select: none;
        }
        .cmd-container .cmd-input-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            min-width: 200px;
        }
        .cmd-container .cmd-input {
            flex: 1;
            background: transparent !important;
            border: none !important;
            color: #cccccc;
            font-family: inherit;
            outline: none;
            padding: 0.2rem 0 !important;
        }
        .cmd-container .cmd-output {
            color: #9cdcfe;
            margin: 0.2rem 0 0.4rem 0 !important;
            padding: 0.2rem 0.45rem !important;
            border-bottom: 1px solid #252525;
            border-left: 2px solid transparent;
            white-space: pre-wrap;
            word-break: break-word;
            overflow-x: auto;
            min-height: 1.05em;
            line-height: 1.28;
        }
        .cmd-container .cmd-output.cmd-output-alt {
            background: rgba(26, 26, 26, 0.5);
            border-left-color: #333;
        }
        .cmd-container .cmd-output:last-child { border-bottom: none; }
        .cmd-container .cmd-output.error { color: #f48771; }
        .cmd-container .cmd-output.error.cmd-output-alt { border-left-color: #f48771; }
        .cmd-container .cmd-output.success { color: #4ec9b0; }
        .cmd-container .cmd-output.success.cmd-output-alt { border-left-color: #4ec9b0; }
        .cmd-container .cmd-list { margin: 0.3rem 0; padding-left: 1.2rem; }
        .cmd-container .cmd-list li { margin: 0.12rem 0; }
        .cmd-container .cmd-section-title { margin: 0.4rem 0 0.15rem 0; }
        .form-container {
            margin: 0.75rem 0;
            padding: 0.75rem;
            background: rgba(26,26,26,0.8);
            border: 1px solid #333;
            border-left: 3px solid #4ec9b0;
        }
        .form-container h3 { color: #4ec9b0; margin-bottom: 0.5rem; }
        .form-field { margin-bottom: 0.5rem; }
        .form-field label { display: block; color: #9cdcfe; margin-bottom: 0.2rem; }
        .form-field input, .form-field select, .form-field textarea {
            width: 100%;
            max-width: 400px;
            padding: 0.35rem 0.5rem;
            background: #0c0c0c;
            border: 1px solid #333;
            color: #cccccc;
            font-family: inherit;
        }
        .form-field .help { color: #858585; margin-top: 0.2rem; }
        .form-container button[type="submit"] {
            margin-top: 0.4rem;
            padding: 0.35rem 0.75rem;
            background: #1a1a1a;
            border: 1px solid #4ec9b0;
            color: #4ec9b0;
            cursor: pointer;
            font-family: inherit;
        }
        .form-container button[type="submit"]:hover {
            background: rgba(78, 201, 176, 0.2);
        }
        .log-entry {
            margin: 0.25rem 0 0.5rem 0;
            border-bottom: 1px solid #252525;
            border-left: 2px solid transparent;
        }
        .log-entry-title {
            padding: 0.2rem 0.5rem;
            line-height: 1.28;
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            color: #9cdcfe;
        }
        .log-entry-title:hover {
            background: rgba(26, 26, 26, 0.5);
        }
        .log-entry-title::before {
            content: '\25B6';
            font-size: 0.7em;
            margin-right: 0.5rem;
            transition: transform 0.15s;
        }
        .log-entry.expanded .log-entry-title::before {
            transform: rotate(90deg);
        }
        .log-entry-json {
            display: none;
            padding: 0.35rem 0.5rem;
            margin: 0 0 0 1rem;
            background: rgba(12, 12, 12, 0.8);
            border: 1px solid #333;
            white-space: pre-wrap;
            word-break: break-word;
            overflow-x: auto;
            color: #ce9178;
        }
        .log-entry.expanded .log-entry-json {
            display: block;
        }
        .log-entry.success .log-entry-title {
            color: #4ec9b0;
        }
        /* JSON tree (browser-console style) */
        .log-entry-json {
            white-space: normal;
        }
        .log-tree {
            font-size: 0.85em;
            line-height: 1.35;
            user-select: text;
        }
        .log-tree-row {
            display: flex;
            align-items: flex-start;
            min-height: 1.35em;
            word-break: break-word;
        }
        .log-tree-row .log-tree-children {
            display: none;
            padding-left: 1.2rem;
            border-left: 1px solid #333;
            margin-left: 0.35rem;
        }
        .log-tree-row.expanded > .log-tree-toggle::before {
            transform: rotate(90deg);
        }
        .log-tree-row.expanded > .log-tree-children {
            display: block;
        }
        .log-tree-toggle {
            cursor: pointer;
            width: 1em;
            flex-shrink: 0;
            color: #858585;
            user-select: none;
        }
        .log-tree-toggle::before {
            content: '\25B6';
            font-size: 0.7em;
            display: inline-block;
            transition: transform 0.15s;
        }
        .log-tree-toggle.empty::before {
            content: '';
        }
        .log-tree-key {
            color: #9cdcfe;
            flex-shrink: 0;
            margin-right: 0.35rem;
        }
        .log-tree-value {
            color: #ce9178;
            min-width: 0;
        }
        .log-tree-value.string { color: #ce9178; }
        .log-tree-value.number { color: #b5cea8; }
        .log-tree-value.boolean { color: #569cd6; }
        .log-tree-value.null { color: #858585; }
        .log-tree-preview {
            color: #858585;
            cursor: pointer;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div class="terminal">
        <div class="header">
            <span class="id" id="header-id">—</span>
            <span class="name" id="header-name">—</span>
            <span class="hint">help + Enter to see the list of commands</span>
        </div>
        <div class="cmd-container" id="cmd-container">
            <div class="cmd-line" id="prompt-line">
                <span class="cmd-prompt" id="cmd-prompt">//engine/—/—></span>
                <span class="cmd-input-wrap">
                    <input type="text" class="cmd-input" id="cmd-input" placeholder="type help + press Enter to see the list of commands" autocomplete="off" spellcheck="false">
                </span>
            </div>
        </div>
    </div>

    <script>
(function() {
    const params = new URLSearchParams(window.location.search);
    const type = params.get('type') || '';
    const id = params.get('id') || '';
    if (!type || !id) {
        document.body.innerHTML = '<div class="terminal" style="padding:2rem;color:#f48771">Missing type or id. Open from Engine grid by clicking a row.</div>';
        document.body.style.background = '#0c0c0c';
        return;
    }
    const typeLabel = { nd: 'node', wk: 'workflow', ass: 'assistant' }[type] || type;

    const headerId = document.getElementById('header-id');
    const headerName = document.getElementById('header-name');
    const cmdPrompt = document.getElementById('cmd-prompt');
    const cmdInput = document.getElementById('cmd-input');
    const cmdContainer = document.getElementById('cmd-container');

    cmdPrompt.textContent = '//engine/' + typeLabel + '/' + (id || '—') + '> ';

    var cmdOutputCount = 0;
    var commandHistory = [];
    var historyIndex = -1;
    var currentOutputMode = 'debug';
    var currentRunBackground = false;

    function appendOutput(text, className) {
        const div = document.createElement('div');
        div.className = 'cmd-output' + (className ? ' ' + className : '');
        if (cmdOutputCount++ % 2 === 1) div.classList.add('cmd-output-alt');
        div.textContent = text;
        cmdContainer.appendChild(div);
        cmdContainer.scrollTop = cmdContainer.scrollHeight;
    }

    function appendExecutionLog(data) {
        var msg = data.message || (data.level ? '[' + data.level + '] ' : '') + (data.text || '');
        if (!msg) msg = '(no message)';
        if (data.event === 'node_output' && data.elapsed_time) msg += ' (' + data.elapsed_time + ')';
        appendToggleEntry(msg, data);
    }

    function renderJsonTree(obj, depth) {
        depth = depth || 0;
        var tree = document.createElement('div');
        tree.className = 'log-tree';
        if (obj === null || typeof obj !== 'object') {
            var valSpan = document.createElement('span');
            valSpan.className = 'log-tree-value' + (obj === null ? ' null' : typeof obj);
            valSpan.textContent = obj === null ? 'null' : String(obj);
            tree.appendChild(valSpan);
            return tree;
        }
        var isArray = Array.isArray(obj);
        var keys = isArray ? obj.map(function(_, i) { return i; }) : Object.keys(obj);
        keys.forEach(function(key) {
            var row = document.createElement('div');
            row.className = 'log-tree-row';
            var val = obj[key];
            var isExpandable = val !== null && typeof val === 'object';
            var toggle = document.createElement('span');
            toggle.className = 'log-tree-toggle' + (isExpandable ? '' : ' empty');
            if (isExpandable) {
                toggle.addEventListener('click', function(e) {
                    e.stopPropagation();
                    row.classList.toggle('expanded');
                });
            }
            var keyEl = document.createElement('span');
            keyEl.className = 'log-tree-key';
            keyEl.textContent = (isArray ? '[' + key + ']' : key) + ': ';
            row.appendChild(toggle);
            row.appendChild(keyEl);
            if (isExpandable) {
                var preview = document.createElement('span');
                preview.className = 'log-tree-preview';
                preview.textContent = Array.isArray(val) ? 'Array(' + val.length + ')' : 'Object';
                preview.addEventListener('click', function(e) {
                    e.stopPropagation();
                    row.classList.toggle('expanded');
                });
                row.appendChild(preview);
                var children = document.createElement('div');
                children.className = 'log-tree-children';
                children.appendChild(renderJsonTree(val, depth + 1));
                row.appendChild(children);
            } else {
                var valueSpan = document.createElement('span');
                valueSpan.className = 'log-tree-value' + (val === null ? ' null' : typeof val);
                var str = val === null ? 'null' : (typeof val === 'string' ? JSON.stringify(val) : String(val));
                if (typeof val === 'string' && str.length > 200) str = str.slice(0, 200) + '...';
                valueSpan.textContent = str;
                row.appendChild(valueSpan);
            }
            tree.appendChild(row);
        });
        return tree;
    }

    function appendToggleEntry(title, data, className) {
        var entry = document.createElement('div');
        entry.className = 'log-entry' + (className ? ' ' + className : '');
        var titleEl = document.createElement('div');
        titleEl.className = 'log-entry-title';
        titleEl.textContent = title;
        var jsonWrap = document.createElement('div');
        jsonWrap.className = 'log-entry-json';
        jsonWrap.appendChild(renderJsonTree(data));
        titleEl.addEventListener('click', function() {
            entry.classList.toggle('expanded');
        });
        entry.appendChild(titleEl);
        entry.appendChild(jsonWrap);
        cmdContainer.appendChild(entry);
        cmdContainer.scrollTop = cmdContainer.scrollHeight;
    }

    function appendPrompt() {
        const line = document.createElement('div');
        line.className = 'cmd-line';
        line.innerHTML = '<span class="cmd-prompt">' + cmdPrompt.textContent + '</span><span class="cmd-input-wrap"><input type="text" class="cmd-input" placeholder="" autocomplete="off" spellcheck="false"></span>';
        cmdContainer.appendChild(line);
        const input = line.querySelector('.cmd-input');
        input.focus();
        input.addEventListener('keydown', handleKeydown);
        cmdContainer.scrollTop = cmdContainer.scrollHeight;
        historyIndex = -1;
        return input;
    }

    function ensureSocketAndEmit(event, data) {
        try {
            if (typeof io === 'undefined' || !window.seedxSocket) {
                appendOutput('Socket.IO is required. Please reload the page.', 'error');
                return false;
            }
            if (!window.seedxSocket.connected) {
                appendOutput('Waiting for Socket.IO connection...', '');
                window.seedxSocket.once('connect', function() {
                    window.seedxSocket.emit(event, data);
                });
            } else {
                window.seedxSocket.emit(event, data);
            }
            return true;
        } catch (err) {
            appendOutput('Error: ' + err.message, 'error');
            return false;
        }
    }

    function stopExecution() {
        appendOutput('^C', '');
        if (!ensureSocketAndEmit('engine_stop', { type: type, id: id })) {
            appendPrompt();
        }
    }

    function handleKeydown(e) {
        const input = e.target;
        
        if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (commandHistory.length === 0) return;
            if (historyIndex < commandHistory.length - 1) {
                historyIndex++;
                input.value = commandHistory[commandHistory.length - 1 - historyIndex];
            }
            return;
        }
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (historyIndex > 0) {
                historyIndex--;
                input.value = commandHistory[commandHistory.length - 1 - historyIndex];
            } else if (historyIndex === 0) {
                historyIndex = -1;
                input.value = '';
            }
            return;
        }
        
        // Ctrl+C to stop execution
        if (e.key === 'c' && e.ctrlKey) {
            e.preventDefault();
            stopExecution();
            return;
        }
        
        if (e.key !== 'Enter') return;
        e.preventDefault();
        const cmd = input.value.trim();
        input.removeEventListener('keydown', handleKeydown);
        input.disabled = true;

        appendOutput(cmdPrompt.textContent + cmd, '');

        if (!cmd) {
            appendPrompt();
            return;
        }

        if (cmd && (commandHistory.length === 0 || commandHistory[commandHistory.length - 1] !== cmd)) {
            commandHistory.push(cmd);
        }

        fetch('/api/engine/validate-command', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ command: cmd, type: type, id: id })
        })
        .then(function(r) { return r.json().then(function(data) { return { ok: r.ok, data: data }; }); })
        .then(function(res) {
            var ok = res.ok, data = res.data;
            if (data.warning) {
                appendOutput('Warning: ' + data.warning, '');
            }
            if (!ok && data.error) {
                appendOutput(data.error, 'error');
                appendPrompt();
                return;
            }
            if (data.valid && data.help) {
                appendOutput('Available commands:', 'success');
                var commands = data.commands || {};
                var sections = commands.sections || [];
                sections.forEach(function(section) {
                    var sectionDiv = document.createElement('div');
                    sectionDiv.className = 'cmd-section-title';
                    sectionDiv.style.cssText = 'color: #dcdcaa; font-weight: bold;';
                    sectionDiv.textContent = section.title;
                    cmdContainer.appendChild(sectionDiv);
                    var ul = document.createElement('ul');
                    ul.className = 'cmd-list';
                    (section.commands || []).forEach(function(c) {
                        var li = document.createElement('li');
                        li.innerHTML = '<span style="color:#4ec9b0;font-weight:bold">' + c.name + '</span> <span style="color:#858585">—</span> <span style="color:#9cdcfe">' + (c.description || '') + '</span>';
                        ul.appendChild(li);
                    });
                    cmdContainer.appendChild(ul);
                });
                if (commands.examples && commands.examples.length > 0) {
                    var exDiv = document.createElement('div');
                    exDiv.className = 'cmd-section-title';
                    exDiv.style.cssText = 'color: #dcdcaa; font-weight: bold;';
                    exDiv.textContent = 'Examples';
                    cmdContainer.appendChild(exDiv);
                    var exUl = document.createElement('ul');
                    exUl.className = 'cmd-list';
                    commands.examples.forEach(function(c) {
                        var li = document.createElement('li');
                        li.innerHTML = '<span style="color:#ce9178">' + c.name + '</span> <span style="color:#858585">—</span> <span style="color:#9cdcfe">' + (c.description || '') + '</span>';
                        exUl.appendChild(li);
                    });
                    cmdContainer.appendChild(exUl);
                }
                appendPrompt();
            } else if (data.valid && data.publish) {
                runPublish(data.type, data.id);
            } else if (data.valid && data.unpublish) {
                runUnpublish(data.type, data.id);
            } else if (data.valid && data.exit) {
                appendOutput('Closing console...', 'success');
                setTimeout(function() { window.close(); }, 300);
            } else if (data.valid && data.execute) {
                runExecution(data.background, data.debug_mode);
            } else {
                appendOutput(data.error || 'Invalid command', 'error');
                appendPrompt();
            }
        })
        .catch(function(err) {
            appendOutput('Error: ' + err.message, 'error');
            appendPrompt();
        });
    }

    function runPublish(recType, recId) {
        appendOutput('Publishing ' + typeLabel + ' "' + recId + '"...', '');
        fetch('/api/engine/publish', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ type: recType, id: recId })
        })
        .then(function(r) { return r.json().then(function(data) { return { ok: r.ok, data: data }; }); })
        .then(function(res) {
            if (res.data.success) {
                appendOutput(res.data.message, 'success');
            } else {
                appendOutput(res.data.error || 'Publish failed', 'error');
            }
        })
        .catch(function(err) {
            appendOutput('Error: ' + err.message, 'error');
        })
        .finally(function() {
            appendPrompt();
        });
    }

    function runUnpublish(recType, recId) {
        appendOutput('Unpublishing ' + typeLabel + ' "' + recId + '"...', '');
        fetch('/api/engine/unpublish', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ type: recType, id: recId })
        })
        .then(function(r) { return r.json().then(function(data) { return { ok: r.ok, data: data }; }); })
        .then(function(res) {
            if (res.data.success) {
                appendOutput(res.data.message, 'success');
            } else {
                appendOutput(res.data.error || 'Unpublish failed', 'error');
            }
        })
        .catch(function(err) {
            appendOutput('Error: ' + err.message, 'error');
        })
        .finally(function() {
            appendPrompt();
        });
    }

    function runExecution(background, outputMode) {
        if (type === 'ass') {
            appendOutput('Assistant execution is not yet implemented.', 'error');
            appendPrompt();
            return;
        }
        currentRunBackground = !!background;
        currentOutputMode = outputMode;
        var context = {
            type: type,
            id: id,
            background: background,
            debug_mode: outputMode
        };
        if (!ensureSocketAndEmit('engine_request_run', context)) {
            appendPrompt();
            return;
        }
        appendOutput('Execution launch confirmed... (press Ctrl+C to stop)', '');
        appendOutput('Waiting for input data...', '');
    }

    cmdInput.addEventListener('keydown', handleKeydown);
    
    // Global Ctrl+C handler
    document.addEventListener('keydown', function(e) {
        if (e.key === 'c' && e.ctrlKey) {
            e.preventDefault();
            stopExecution();
        }
    });

    if (type && id) {
        fetch('/api/engine/record?type=' + encodeURIComponent(type) + '&id=' + encodeURIComponent(id))
            .then(function(r) { return r.json(); })
            .then(function(record) {
                headerId.textContent = id;
                headerName.textContent = record.name || record.node_id || record.workflow_id || record.assistant_id || '';
            })
            .catch(function() {
                headerId.textContent = id;
                headerName.textContent = '(load failed)';
            });
    }

    if (typeof io !== 'undefined' && window.seedxSocket) {
        window.seedxSocket.on('engine_form_schema', function(payload) {
            try {
                var formSchema = payload.form_schema || {};
                var context = payload.context || {};
                var isNodeForm = (context.type === 'nd' && context.execution_id) || (context.node_id && context.execution_id);
                var mode = currentOutputMode;
                
                if (isNodeForm && (mode === 'trace' || context.background)) {
                    ensureSocketAndEmit('engine_form_data', { form_data: {}, context: context });
                    return;
                }
                
                if (formSchema.fields && formSchema.fields.length > 0) {
                    EngineRunForm.renderFormFromSchema(formSchema, cmdContainer, function(formData) {
                        ensureSocketAndEmit('engine_form_data', { form_data: formData, context: context });
                        if (!isNodeForm && context.background) {
                            appendOutput('The plugin is running. To view execution status, go to the Jobs list.', 'success');
                            appendPrompt();
                        }
                    }, appendOutput);
                } else {
                    ensureSocketAndEmit('engine_form_data', { form_data: {}, context: context });
                    if (!isNodeForm && context.background) {
                        appendOutput('The plugin is running. To view execution status, go to the Jobs list.', 'success');
                        appendPrompt();
                    } else {
                        appendOutput('Initializing (no form fields). Running...', 'success');
                    }
                }
            } catch (err) {
                appendOutput('Error: ' + err.message, 'error');
            }
        });

        window.seedxSocket.on('engine_message', function(data) {
            try {
                if (currentRunBackground) return;
                appendOutput(data.message || JSON.stringify(data), data.type === 'success' ? 'success' : '');
            } catch (_) {}
        });

        window.seedxSocket.on('engine_error', function(data) {
            try {
                appendOutput(data.message || JSON.stringify(data), 'error');
            } catch (_) {}
        });

        window.seedxSocket.on('engine_result', function(data) {
            try {
                if (!currentRunBackground) {
                    var title = 'Execution completed';
                    if (data.elapsed_time) title += ' (' + data.elapsed_time + ')';
                    appendToggleEntry(title, data, 'success');
                }
                appendPrompt();
            } catch (_) {}
        });

        window.seedxSocket.on('engine_stopped', function(data) {
            try {
                appendOutput(data.message || 'Execution stopped', '');
                appendPrompt();
            } catch (_) {}
        });

        window.seedxSocket.on('execution_log', function(data) {
            if (currentRunBackground) return;
            appendExecutionLog(data);
        });
    }

    var eventSource;
    if (params.get('sse') !== 'false') {
        try {
            eventSource = new EventSource('/events');
            eventSource.onmessage = function(ev) {
                try {
                    var data = JSON.parse(ev.data);
                    if (data.type === 'connected') return;
                    var msg = data.message || (data.data && (data.data.message || data.data.text || JSON.stringify(data.data)));
                    if (msg || data.type === 'custom') appendOutput(msg || JSON.stringify(data), '');
                } catch (_) {}
            };
        } catch (_) {}
    }
})();
    </script>
</body>
