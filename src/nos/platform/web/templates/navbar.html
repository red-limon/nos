<!DOCTYPE html>
<html lang="en" data-theme="{% if request.path.startswith('/redlimon') %}redlemon{% else %}nos{% endif %}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app-theme.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme-light.css') }}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; }

        /* ==========================================================================
           App-style compact navbar (title bar height)
           ========================================================================== */
        .navbar {
            display: flex;
            align-items: center;
            height: 32px;
            min-height: 32px;
            max-height: 32px;
            background: var(--term-panel);
            border-bottom: 1px solid var(--term-border);
            padding: 0;
            font-size: 12px;
            flex-shrink: 0;
        }

        /* nOS + menu trigger */
        .navbar-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 10px;
            height: 100%;
            min-height: 32px;
            border-right: 1px solid var(--term-accent, #00d4ff);
            cursor: pointer;
            transition: background 0.15s;
            position: relative;
        }

        .navbar-brand::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 0 0 5px 5px;
            border-color: transparent transparent var(--term-accent, #00d4ff) transparent;
        }

        .navbar-brand:hover {
            background: var(--term-border);
        }

        .navbar-brand-text {
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 0.03em;
            color: var(--term-accent, #00d4ff);
        }
        .navbar-brand-menu-icon {
            margin-left: 4px;
            font-size: 10px;
            opacity: 0.9;
            color: var(--term-accent, #00d4ff);
        }

        /* Menu Items */
        .navbar-menu {
            display: flex;
            align-items: center;
            height: 100%;
            flex: 1;
            min-height: 0;
        }

        .navbar-item {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 0 10px;
            height: 100%;
            min-height: 32px;
            color: var(--term-muted);
            text-decoration: none;
            transition: background 0.15s, color 0.15s;
            border-right: 1px solid transparent;
            white-space: nowrap;
            font-size: 12px;
        }

        .navbar-item:hover {
            background: var(--term-border);
            color: var(--term-text);
        }

        .navbar-item.active {
            color: var(--term-accent);
            background: rgba(78, 201, 176, 0.1);
        }

        .navbar-item-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            opacity: 0.9;
        }
        .navbar-item-icon svg {
            width: 100%;
            height: 100%;
            stroke: currentColor;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Sign out - push to right */
        .navbar-spacer {
            flex: 1;
        }

        .navbar-item.signout {
            border-left: 1px solid var(--term-border);
            color: var(--term-muted);
        }

        .navbar-item.signout:hover {
            color: #f38ba8;
            background: rgba(243, 139, 168, 0.1);
        }

        /* Notification Badge */
        .navbar-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 14px;
            height: 14px;
            padding: 0 3px;
            margin-left: 3px;
            background: #f38ba8;
            color: #1e1e2e;
            font-size: 10px;
            font-weight: 600;
            border-radius: 7px;
            animation: badge-pulse 2s ease-in-out infinite;
        }

        @keyframes badge-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* ==========================================================================
           Responsive
           ========================================================================== */
        @media (max-width: 600px) {
            .navbar-menu {
                display: none;
            }
            
            .navbar-brand {
                border-right: none;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <!-- nOS + menu hint: toggles offcanvas -->
        <div class="navbar-brand" onclick="parent.openMenu()" title="Open application menu" role="button" tabindex="0">
            <span class="navbar-brand-text">nOS</span>
            <span class="navbar-brand-menu-icon" aria-hidden="true">▼</span>
        </div>

        <!-- Menu Items -->
        <div class="navbar-menu">
            <a href="{{ url_for('web.engine_console_v2') }}" class="navbar-item" target="_blank" rel="noopener noreferrer">
                <span class="navbar-item-icon" aria-hidden="true"><svg viewBox="0 0 24 24" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="1"/><path d="M6 9h12M6 13h8"/></svg></span>
                <span>Console</span>
            </a>
            <a href="{{ url_for('web.app_page') }}" class="navbar-item" target="_blank" rel="noopener noreferrer">
                <span class="navbar-item-icon" aria-hidden="true"><svg viewBox="0 0 24 24" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></span>
                <span>Apps</span>
                <span class="navbar-badge">3</span>
            </a>
            <a href="{{ url_for('web.index') }}" class="navbar-item" target="_top">
                <span class="navbar-item-icon" aria-hidden="true"><svg viewBox="0 0 24 24" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><path d="M8 7h8M8 11h8"/></svg></span>
                <span>Docs</span>
            </a>

            <!-- Spacer -->
            <div class="navbar-spacer"></div>

            <!-- Sign out -->
            <a href="{{ url_for('web.logout') }}" class="navbar-item signout" target="_top">
                <span class="navbar-item-icon" aria-hidden="true"><svg viewBox="0 0 24 24" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span>
                <span>Sign out</span>
            </a>
        </div>
    </nav>
</body>
</html>
