<!DOCTYPE html>
<html lang="en" data-theme="{% if request.path.startswith('/redlimon') %}redlemon{% else %}nos{% endif %}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app-theme.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme-light.css') }}">
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; box-sizing: border-box; }
        body { padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        .dashboard {
            width: 100%;
            flex: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 0.75rem;
            overflow-y: auto;
        }
        .home-content-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--term-text);
            margin: 0 0 0.5rem 0;
        }
        .home-placeholder {
            font-size: 1rem;
            color: var(--term-muted);
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1 class="home-content-title">{{ app_title }}</h1>
        <p class="home-placeholder">Page to be written...</p>
    </div>
</body>
</html>
