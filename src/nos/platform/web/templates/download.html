{% extends "base.html" %}
{% block page_title %}Download – {{ app_title }}{% endblock %}
{% block extra_head %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">
{% endblock %}
{% block extra_css %}
    <style>
        :root {
            --fx-bg: #0a0e17;
            --fx-border: rgba(0, 212, 255, 0.25);
            --fx-accent: #00d4ff;
            --fx-text: #e2e8f0;
            --fx-text-muted: #94a3b8;
        }
        .download-page {
            min-height: 100vh;
            font-family: system-ui, sans-serif;
            background: var(--fx-bg);
            color: var(--fx-text);
            padding: 4rem 1.5rem 2rem;
        }
        .download-page a { color: var(--fx-accent); text-decoration: none; }
        .download-page a:hover { text-decoration: underline; }
        .download-content {
            max-width: 560px;
            margin: 0 auto;
            text-align: center;
        }
        .download-content h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.75rem;
            color: var(--fx-accent);
            margin-bottom: 1rem;
        }
        .download-content p {
            color: var(--fx-text-muted);
            line-height: 1.7;
        }
        .back-link {
            display: inline-block;
            margin-top: 2rem;
            font-size: 0.9rem;
            color: var(--fx-text-muted);
        }
        .back-link:hover { color: var(--fx-accent); }
    </style>
{% endblock %}
{% block body %}
<div class="download-page">
    <div class="download-content">
        <h1>Download</h1>
        <p>This page is to be written.</p>
        <p><a href="{{ url_for('web.index') }}" class="back-link">← Back to nOS</a></p>
    </div>
</div>
{% endblock %}
